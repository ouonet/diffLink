name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests and build plugin
        run: ./gradlew --no-daemon test buildPlugin

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: difflink-plugin-zip
          path: build/distributions/*.zip

  verify:
    runs-on: ubuntu-latest
    env:
      VERIFIER_IDE_VERSIONS: ${{ github.event_name == 'pull_request' && 'IC-252.26830.84' || 'IC-232.9559.62,IC-252.26830.84' }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Cache Plugin Verifier IDEs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pluginVerifier
          key: ${{ runner.os }}-plugin-verifier-ides-v1-${{ env.VERIFIER_IDE_VERSIONS }}
          restore-keys: |
            ${{ runner.os }}-plugin-verifier-ides-v1-

      - name: Run Plugin Verifier
        run: |
          run_verifier() {
            ./gradlew --no-daemon runPluginVerifier -PpluginVerifierIdeVersions=${VERIFIER_IDE_VERSIONS}
          }

          for attempt in 1 2 3; do
            echo "Plugin Verifier attempt ${attempt}/3"
            if run_verifier; then
              exit 0
            fi

            if [[ "${attempt}" -lt 3 ]]; then
              echo "Plugin Verifier failed on attempt ${attempt}. Retrying..."
            fi
          done

          echo "Plugin Verifier failed after 3 attempts"
          exit 1

