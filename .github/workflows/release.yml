name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version to publish (for example: 1.0.4)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  verify-ci-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Ensure CI build and verify succeeded for this commit
        env:
            GITHUB_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys
            import time
            import urllib.error
            import urllib.parse
            import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]
          token = os.environ["GITHUB_TOKEN"]
          base_url = f"https://api.github.com/repos/{repo}"

          def api_get(path, params=None):
            query = ""
            if params:
              query = "?" + urllib.parse.urlencode(params)
            url = f"{base_url}{path}{query}"
            req = urllib.request.Request(
              url,
              headers={
                "Accept": "application/vnd.github+json",
                "Authorization": f"Bearer {token}",
                "X-GitHub-Api-Version": "2022-11-28",
              },
            )
            try:
              with urllib.request.urlopen(req) as resp:
                return json.loads(resp.read().decode("utf-8"))
            except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace")
              print(f"GitHub API request failed: {url}")
              print(body)
              sys.exit(1)

          def list_ci_runs():
            payload = api_get(
              "/actions/workflows/ci.yml/runs",
              {"head_sha": sha, "per_page": 50}
            )
            return payload.get("workflow_runs", [])

          ci_run = None
          max_attempts = 30
          wait_seconds = 20

          for attempt in range(1, max_attempts + 1):
            runs = list_ci_runs()
            completed_success = [r for r in runs if r.get("status") == "completed" and r.get("conclusion") == "success"]

            if completed_success:
              completed_success.sort(key=lambda r: r.get("createdAt", ""), reverse=True)
              ci_run = completed_success[0]
              break

            states = [f"{r.get('status')}/{r.get('conclusion')}" for r in runs]
            states_text = ", ".join(states) if states else "none"
            print(
              f"No successful CI run found for commit {sha} yet "
              f"(attempt {attempt}/{max_attempts}). Current CI states: {states_text}"
            )

            if attempt < max_attempts:
              time.sleep(wait_seconds)

          if ci_run is None:
            print(
              f"No successful CI run found for commit {sha} after "
              f"{max_attempts * wait_seconds} seconds. Release is blocked."
            )
            sys.exit(1)

          run_id = ci_run["databaseId"]
          print(f"Using CI run: {run_id} ({ci_run.get('url', '')})")

            jobs_data = api_get(f"/actions/runs/{run_id}/jobs")
          jobs = jobs_data.get("jobs", [])

          required = {"build", "verify"}
          results = {j.get("name"): j.get("conclusion") for j in jobs if j.get("name") in required}

          missing = sorted(required - set(results.keys()))
          failed = sorted(name for name, conclusion in results.items() if conclusion != "success")

          if missing:
              print("Missing required CI jobs:", ", ".join(missing))
              sys.exit(1)

          if failed:
              print("Required CI jobs not successful:", ", ".join(failed))
              for j in jobs:
                  if j.get("name") in required:
                      print(f"- {j.get('name')}: {j.get('conclusion')}")
              sys.exit(1)

          print("CI gate passed: build=success, verify=success")
          PY

  publish:
    needs: verify-ci-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Sign and publish
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          VERSION="${RELEASE_VERSION}"
          NORMALIZED_VERSION="${VERSION#v}"
          if [[ ! "${NORMALIZED_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: ${VERSION}. Expected semantic version like 1.0.4 or v1.0.4"
            exit 1
          fi
          echo "Publishing plugin version: ${NORMALIZED_VERSION} (from ${VERSION})"

          ./gradlew --no-daemon \
            signPlugin publishPlugin \
            -PpluginVersion="${NORMALIZED_VERSION}"

