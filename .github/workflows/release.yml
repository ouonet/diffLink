name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version to publish (for example: 1.0.4)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Restore Plugin Verifier IDEs cache
        id: plugin-verifier-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/pluginVerifier
          key: ${{ runner.os }}-plugin-verifier-ides-v1-IC-232.9559.62-IC-2025.2.6.1-IU-2025.2.6.1
          restore-keys: |
            ${{ runner.os }}-plugin-verifier-ides-v1-

      - name: Show Plugin Verifier cache status
        run: |
          echo "cache-hit=${{ steps.plugin-verifier-cache-restore.outputs.cache-hit }}"
          echo "cache-primary-key=${{ steps.plugin-verifier-cache-restore.outputs.cache-primary-key }}"

      - name: Test, verify, sign, and publish
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version }}
          VERIFIER_IDE_VERSIONS: IC-232.9559.62,IC-2025.2.6.1,IU-2025.2.6.1
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          VERSION="${RELEASE_VERSION}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: ${VERSION}. Expected semantic version like 1.0.4"
            exit 1
          fi
          echo "Publishing plugin version: ${VERSION}"

          ./gradlew --no-daemon \
            test buildPlugin \
            -PpluginVersion="${VERSION}"

          run_verifier() {
            ./gradlew --no-daemon \
              runPluginVerifier \
              -PpluginVersion="${VERSION}" \
              -PpluginVerifierIdeVersions=${VERIFIER_IDE_VERSIONS}
          }

          for attempt in 1 2 3; do
            echo "Plugin Verifier attempt ${attempt}/3"
            if run_verifier; then
              break
            fi

            if [[ "${attempt}" -eq 3 ]]; then
              echo "Plugin Verifier failed after 3 attempts"
              exit 1
            fi

            echo "Plugin Verifier failed on attempt ${attempt}. Retrying..."
          done

          ./gradlew --no-daemon \
            signPlugin publishPlugin \
            -PpluginVersion="${VERSION}"

      - name: Save Plugin Verifier IDEs cache
        if: ${{ always() && steps.plugin-verifier-cache-restore.outputs.cache-hit != 'true' && steps.plugin-verifier-cache-restore.outputs.cache-primary-key != '' }}
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/pluginVerifier
          key: ${{ steps.plugin-verifier-cache-restore.outputs.cache-primary-key }}

