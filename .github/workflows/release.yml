name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: "Plugin version to publish (for example: 1.0.4)"
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Cache Plugin Verifier IDEs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pluginVerifier
          key: ${{ runner.os }}-plugin-verifier-ides-v1-IC-232.9559.62-IC-252.26830.84-IU-252.26830.84
          restore-keys: |
            ${{ runner.os }}-plugin-verifier-ides-v1-

      - name: Test, verify, sign, and publish
        env:
          RELEASE_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || github.event.inputs.version }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: |
          VERSION="${RELEASE_VERSION}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: ${VERSION}. Expected semantic version like 1.0.4"
            exit 1
          fi
          echo "Publishing plugin version: ${VERSION}"

          ./gradlew --no-daemon \
            test buildPlugin runPluginVerifier signPlugin publishPlugin \
            -PpluginVersion="${VERSION}" \
            -PpluginVerifierIdeVersions=IC-232.9559.62,IC-252.26830.84,IU-252.26830.84

